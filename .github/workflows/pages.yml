name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Verify docs/viz freshness before upload
        run: |
          echo "Deploying commit: ${GITHUB_SHA}"
          test -f docs/viz/pipeline_health.csv
          python - <<'PYVAL'
          import pandas as pd
          from pathlib import Path
          df = pd.read_csv(Path('docs/viz/pipeline_health.csv'))
          if df.empty:
              raise SystemExit('docs/viz/pipeline_health.csv is empty')
          print('docs/viz run_date:', df.iloc[0].get('run_date'))
          PYVAL

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
