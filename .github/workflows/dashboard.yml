name: Dashboard
permissions:
  contents: write
on:
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          lfs: true
      - name: Setup Git LFS
        run: git lfs install
      - name: Fetch LFS models
        run: git lfs pull
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install yfinance==0.2.61 ta==0.11.0 requests-cache==1.2.0 pandas>=2.2
          pip install -r requirements.txt
      - name: Generar visualizaciones y manifest
        run: python -m src.visualization
      - name: Validate generated visualization images
        run: |
          python - <<'PYVAL'
          from pathlib import Path

          expected = [
              'candlestick.svg',
              'pred_vs_real.svg',
              'best_variables.svg',
              'error_heatmap.svg',
              'direction_accuracy.svg',
              'residual_distribution.svg',
              'mae_trend.svg',
              'risk_return_signals.svg',
              'driver_stability.svg',
              'operational_coverage.svg',
          ]

          missing = []
          for folder in (Path('results/viz'), Path('docs/viz')):
              for name in expected:
                  if not (folder / name).exists():
                      missing.append(str(folder / name))

          if missing:
              raise SystemExit('Missing generated SVG assets: ' + ', '.join(missing))

          print('All expected SVG assets were generated and synchronized.')
          PYVAL
      - name: Validar sincronización run_date en docs/viz
        run: |
          python - <<'PYVAL'
          import pandas as pd
          from pathlib import Path

          results_file = Path('results/viz/pipeline_health.csv')
          docs_file = Path('docs/viz/pipeline_health.csv')

          if not results_file.exists() or not docs_file.exists():
              raise SystemExit('Missing pipeline_health.csv in results/viz or docs/viz')

          results_df = pd.read_csv(results_file)
          docs_df = pd.read_csv(docs_file)

          if results_df.empty or docs_df.empty:
              raise SystemExit('pipeline_health.csv is empty in results/viz or docs/viz')

          results_run_date = str(results_df.iloc[0].get('run_date', ''))
          docs_run_date = str(docs_df.iloc[0].get('run_date', ''))

          if results_run_date != docs_run_date:
              raise SystemExit(
                  f'run_date mismatch: results/viz={results_run_date} docs/viz={docs_run_date}'
              )

          print(f'run_date validated: {results_run_date}')
          PYVAL
      - name: Commit dashboard visualizations
        env:
          PUSH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add results/viz/*.csv 2>/dev/null || true
          git add results/viz/*.svg 2>/dev/null || true
          git add results/viz/*.json 2>/dev/null || true
          git add docs/viz/*.csv 2>/dev/null || true
          git add docs/viz/*.svg 2>/dev/null || true
          git add docs/viz/*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit"
          else
            git commit -m "Update dashboard visualizations"
            token=${PUSH_TOKEN:-$GITHUB_TOKEN}
            git push https://x-access-token:${token}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
          fi
