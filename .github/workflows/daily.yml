name: Daily Processing
permissions:
  contents: write
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}
jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          lfs: true
      - name: Setup Git LFS
        run: git lfs install
      - name: Fetch LFS models
        run: git lfs pull
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install yfinance==0.2.61 ta==0.11.0 requests-cache==1.2.0 pandas>=2.2
          pip install -r requirements.txt
      - name: Build ABT
        run: |
          set -e
          python -m src.abt.build_abt 2>&1 | tee abt.log || { echo "::error::ABT failed"; exit 1; }
      - name: Upload ABT artifacts
        uses: actions/upload-artifact@v4
        with:
          name: abt-data
          path: data/*.csv
      - name: Monitor intraday latency
        run: |
          python -m src.monitoring.data_latency
      - name: Schema smoke test
        run: |
          python -m src.models.train_model --ticker NVDA --rows 10 --smoke
          python -m src.models.predict --ticker NVDA --rows 10
      - name: Predict
        run: |
          set -e
          python -m src.predict 2>&1 | tee predict.log || { echo "::error::Prediction failed"; exit 1; }
      - name: Validate prediction artifacts non-empty
        run: |
          python - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path
          import pandas as pd

          run_date = datetime.now(timezone.utc).date().isoformat()
          pred_root = Path("results/predicts")
          metrics_root = Path("results/metrics")

          daily_file = pred_root / f"{run_date}_daily_predictions.csv"
          edge_file = pred_root / f"{run_date}_edge_prediction.csv"

          def fail(path: Path, reason: str) -> None:
              raise SystemExit(f"[prediction-artifact-error] {path.as_posix()}: {reason}")

          def validate_csv(path: Path, required: set[str]) -> None:
              if not path.exists():
                  fail(path, "file_not_found")
              if not path.is_file():
                  fail(path, "not_a_file")
              if path.stat().st_size == 0:
                  fail(path, "empty_file")
              try:
                  df = pd.read_csv(path)
              except pd.errors.EmptyDataError:
                  fail(path, "csv_parse_error_empty_data")
              except Exception as exc:
                  fail(path, f"csv_parse_error:{type(exc).__name__}")
              if df.empty and len(df.columns) == 0:
                  fail(path, "csv_parse_error_no_columns")
              missing = sorted(required - set(df.columns))
              if missing:
                  fail(path, f"missing_columns:{missing}")
              if len(df) == 0:
                  fail(path, "zero_rows")

          validate_csv(daily_file, {"ticker", "model", "actual", "pred"})
          validate_csv(edge_file, {"ticker", "model", "pred", "Predicted"})
          print(f"[prediction-artifact-ok] validated run_date={run_date} files: {daily_file.name}, {edge_file.name}")

          # Optional historical check: diagnostics only; never used for pass/fail of today's prediction.
          historical_metrics = sorted(metrics_root.glob("edge_metrics_*.csv"))
          if not historical_metrics:
              print("::warning::No historical edge_metrics_*.csv files found (optional check).")
          else:
              print(f"[optional-metrics-check] latest historical metric file: {historical_metrics[-1].name}")
          PY
      - name: Evaluate drift
        run: |
          python -m src.edge_drift
      - name: Commit results
        env:
          PUSH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add results/predicts/*_daily_predictions.csv 2>/dev/null || true
          git add results/predicts/*_edge_prediction.csv 2>/dev/null || true
          git add results/metrics/edge_metrics_*.csv 2>/dev/null || true
          git add results/edge_metrics/*.csv 2>/dev/null || true
          git add results/drift/*.csv 2>/dev/null || true
          git add results/latency/*.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update daily predictions"
            token=${PUSH_TOKEN:-$GITHUB_TOKEN}
            git push https://x-access-token:${token}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
          fi
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-logs
          path: |
            abt.log
            predict.log
      - run: python -m src.notify.notifier --message "Proceso diario completado"
      - name: Generate viz tables
        run: |
          python -m src.visualization
          python -m src.monitoring.latency_viz
      - name: Validate dashboard freshness
        run: |
          python -m src.monitoring.dashboard_freshness --max-age-hours 36
      - name: Commit visualizations
        env:
          PUSH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add results/viz/*.csv docs/viz/*.svg docs/viz/*.csv docs/viz/manifest.json 2>/dev/null || true
          git add results/viz/strategy_performance/*.csv 2>/dev/null || true
          git add docs/viz/strategy_performance/*.csv 2>/dev/null || true
          git add results/viz/last_run_report.json 2>/dev/null || true
          git add docs/viz/last_run_report.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No visualization changes to commit"
          else
            git commit -m "Update daily visualizations"
            token=${PUSH_TOKEN:-$GITHUB_TOKEN}
            git push https://x-access-token:${token}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
          fi
